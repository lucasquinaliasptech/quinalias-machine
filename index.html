<!DOCTYPE html>
<html lang="pt" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;1,100;1,200;1,300;1,400;1,500;1,600;1,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <title>Quinália's Machine</title>
</head>
<style>
    * {
        font-family: "IBM Plex Mono", monospace;
        box-sizing: border-box;
        color: var(--text);
    }
    
    body {
        background-color: var(--background);
        transition: 0.2s;
    }

    [data-theme="light"] {
        --background: #ffffff;
        --foreground: #ffffff;
        --accent: #5863D6;
        --muted: #E1E1FB;

        --input: #E4E4E4;
        --border: #E4E4E4;
        --text: #000;

        --shadow: rgba(0, 0, 0, 0.05);
    }

    [data-theme="dark"] {
        --background: #191919;
        --foreground: #252525;
        --accent: #5863D6;
        --muted: #E1E1FB;

        --input: #333333;
        --border: #333333;
        --text: #fff;

        --shadow: rgba(0, 0, 0, 0.05);
    }

    header {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 20px;
        text-align: center;
        margin: 20px auto;
        padding: 0 20px;
    }

    section {
        width: fit-content;
        margin: 20px auto;
        padding: 0 20px;
        border: 2px solid var(--border);
        border-radius: 20px;
        box-shadow: 0 10px 10px 0 var(--shadow);
        background-color: var(--foreground);
    }

    .base {
        display: flex;
        align-items: center;
        gap: 20px;
        margin-top: 5px;
    }

    footer {
        text-align: center;
    }

    .input {
        background-color: var(--input);
        border-radius: 10px;
        border: 2px solid var(--border);
        padding: 5px;
        width: 100%;
        height: 30px;
    }

    .input:focus {
        outline: 2px solid var(--accent);
    }

    #theme-toggler {
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        width: 50px;
        height: 50px;
        border: 2px solid var(--border);
        border-radius: 15px;
        box-shadow: 0 10px 10px 0 var(--shadow);
        background-color: var(--foreground);
    }

    a {
        color: var(--accent);
    }
</style>

<body>
    <header>
        <h1>Quinália's Machine</h1>
        <span id="theme-toggler" class="fa-solid fa-sun" onclick="toggleTheme()"></span>
    </header>

    <section>
        <div class="base">
            <p><b>Decimal: </b></p>
            <input id="ipt_decimal" type="text" class="input" oninput="converterDecimal()">
        </div>
        <div class="base">
            <p><b>Octal: </b></p>
            <input id="ipt_octal" type="text" class="input" oninput="converterOctal()">
        </div>
        <div class="base">
            <p><b>Hexadecimal: </b></p>
            <input id="ipt_hexadecimal" type="text" class="input" oninput="converterHexadecimal()">
        </div>
        <div class="base">
            <p><b>Binário: </b></p>
            <input id="ipt_binario" type="text" class="input" oninput="converterBinario()">
        </div>
    </section>

    <footer>
        <p>Made with &lt;3 by <a href="https://linktr.ee/lucasquinalia">Lucas Quinália</a></p>
    </footer>
</body>
<script>
    function converterDecimal() {
        var decimal = Number(ipt_decimal.value);

        ipt_octal.value = decimal.toString(8);
        ipt_hexadecimal.value = decimal.toString(16);
        ipt_binario.value = decimal.toString(2);
    }

    function converterOctal() {
        var octal = ipt_octal.value;

        ipt_decimal.value = parseInt(octal, 8);
        ipt_hexadecimal.value = parseInt(octal, 8).toString(16);
        ipt_binario.value = parseInt(octal, 8).toString(2);
    }

    function converterHexadecimal() {
        var hexadecimal = ipt_hexadecimal.value;

        ipt_decimal.value = parseInt(hexadecimal, 16);
        ipt_octal.value = parseInt(hexadecimal, 16).toString(8);
        ipt_binario.value = parseInt(hexadecimal, 16).toString(2);
    }

    function converterBinario() {
        var binario = ipt_binario.value;

        ipt_decimal.value = parseInt(binario, 2);
        ipt_octal.value = parseInt(binario, 2).toString(8);
        ipt_hexadecimal.value = parseInt(binario, 2).toString(16);
    }

    function toggleTheme() {
        const html = document.querySelector('html');

        const toggler = document.getElementById('theme-toggler')

        const theme = html.getAttribute('data-theme');

        if (theme === 'light') {
            html.setAttribute('data-theme', 'dark');
            toggler.classList.replace("fa-sun", "fa-moon");
        } else {
            html.setAttribute('data-theme', 'light')
            toggler.classList.replace("fa-moon", "fa-sun");
        }
    }
</script>
</html>
